<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iframe Resize Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; padding: 16px; }

    .controls {
      background: #1e293b;
      color: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      font-size: 13px;
    }
    .url-bar {
      background: #1e293b;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
    .url-bar input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }
    .url-bar input:focus { border-color: #22c55e; }
    .url-bar button {
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .url-bar .current-url {
      font-family: monospace;
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }

    .controls label { font-weight: 600; color: #94a3b8; }
    .controls select { accent-color: #22c55e; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 6px; padding: 4px 8px; }
    .controls input[type=range] { accent-color: #22c55e; width: 160px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
    }
    .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
    .badge .dot.ok   { background: #22c55e; }
    .badge .dot.warn { background: #f59e0b; }
    .badge .dot.err  { background: #ef4444; }

    .container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      max-width: 420px;
    }

    iframe {
      width: 100%;
      display: block;
      border: none;
      transition: height 0.2s ease;
      min-height: 500px;
    }

    .log {
      margin-top: 16px;
      background: #0f172a;
      color: #94a3b8;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      font-family: monospace;
      max-height: 220px;
      overflow-y: auto;
    }
    .log .entry { padding: 2px 0; border-bottom: 1px solid #1e293b; }
    .log .entry.ok   { color: #22c55e; }
    .log .entry.warn { color: #f59e0b; }
    .log .entry.err  { color: #ef4444; }
  </style>
</head>
<body>

<!-- Base URL row -->
<div class="url-bar">
  <label style="white-space:nowrap;font-weight:600">Base URL:</label>
  <input type="text" id="baseUrl" placeholder="https://yoursite.com" />
  <button onclick="switchPage()">Load</button>
</div>

<!-- Controls row -->
<div class="controls">
  <span>
    <label>Page: </label>
    <select id="pageSelect" onchange="switchPage()">
      <option value="/apply">Apply Form (/apply)</option>
      <option value="/car-loan">Rate Roast (/car-loan)</option>
    </select>
  </span>

  <span>
    <label>Width: </label>
    <input type="range" id="widthRange" min="280" max="900" value="420" oninput="setWidth(this.value)" />
    <span id="widthLabel">420px</span>
  </span>

  <span class="badge">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">waiting…</span>
  </span>

  <span class="badge" style="color:#fff">
    iframe h: <strong id="iframeH">—</strong>
  </span>

  <button onclick="clearLog()" style="margin-left:auto;background:#334155;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px">Clear log</button>
</div>

<div class="container" id="container">
  <iframe id="calcIframe" scrolling="no" allowtransparency="true"></iframe>
</div>

<div class="log" id="log"><div class="entry">— enter your site URL above and click Load —</div></div>

<script>
  var iframe   = document.getElementById('calcIframe');
  var logEl    = document.getElementById('log');
  var dot      = document.getElementById('statusDot');
  var statusTx = document.getElementById('statusText');
  var iframeHEl = document.getElementById('iframeH');
  var msgCount = 0;

  // Auto-fill base URL: use current origin if served from the app,
  // otherwise leave blank so the user can type their URL.
  (function () {
    var origin = window.location.origin;
    if (origin && origin !== 'null' && !origin.startsWith('file')) {
      document.getElementById('baseUrl').value = origin;
      switchPage();
    } else {
      addLog('⚠ Opened as a local file — enter your site URL (e.g. http://localhost:3000) and click Load', 'warn');
    }
  })();

  function getBase() {
    return (document.getElementById('baseUrl').value || '').replace(/\/$/, '');
  }

  function switchPage() {
    var base = getBase();
    if (!base) { addLog('Enter a base URL first', 'err'); return; }
    var page = document.getElementById('pageSelect').value;
    var url  = base + page;
    iframe.src = url;
    iframe.style.height = '500px';
    iframeHEl.textContent = '—';
    dot.className = 'dot';
    statusTx.textContent = 'loading…';
    addLog('→ loading ' + url, 'ok');
  }

  function setWidth(val) {
    document.getElementById('container').style.maxWidth = val + 'px';
    document.getElementById('widthLabel').textContent = val + 'px';
    addLog('container width → ' + val + 'px');
  }

  function addLog(msg, cls) {
    var d = document.createElement('div');
    d.className = 'entry' + (cls ? ' ' + cls : '');
    d.textContent = new Date().toLocaleTimeString() + '  ' + msg;
    logEl.prepend(d);
    while (logEl.children.length > 80) logEl.removeChild(logEl.lastChild);
  }

  function clearLog() { logEl.innerHTML = ''; }

  window.addEventListener('message', function (e) {
    if (!e.data || e.data.type !== 'calculator-resize') return;
    var h = e.data.height;
    msgCount++;

    iframe.style.height = h + 'px';
    iframeHEl.textContent = h + 'px';
    dot.className = 'dot ok';
    statusTx.textContent = 'resize #' + msgCount + ' → ' + h + 'px';
    addLog('calculator-resize → ' + h + 'px', 'ok');

    if (h > 0 && h <= window.screen.height && h % 100 === 0) {
      dot.className = 'dot warn';
      addLog('  ⚠ height is suspiciously round — may be viewport-clamped', 'warn');
    }
  });
</script>
</body>
</html>
